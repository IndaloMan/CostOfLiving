<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Cost of Living Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
</head>
<body class="login-page">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <div class="login-container">
        <div class="login-brand">Reset Password</div>
        <p style="text-align:center; color:#666; margin-bottom:1.5rem; font-size:0.9rem;">
            Enter your Login ID or email address and we'll send you a reset link.
        </p>
        <form method="POST" class="login-form">
            <div class="form-group">
                <label for="identifier">Login ID or Email</label>
                <input type="text" id="identifier" name="identifier" required autofocus
                       autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Send Reset Link</button>
        </form>
        <p style="text-align:center; margin-top:1rem; font-size:0.85rem; color:#888;">
            <a href="/login" style="color:#2980b9;">Back to Login</a>
        </p>
    </div>
</body>
</html>
