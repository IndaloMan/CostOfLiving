<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cost of Living Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
</head>
<body>
    <nav>
        <div class="nav-brand">Cost of Living Tracker</div>
        <button class="nav-hamburger" id="navToggle" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/scan">Scan Receipt</a></li>
            <li><a href="/receipts">Receipts</a></li>
            <li><a href="/companies">Companies</a></li>
            <li><a href="/reports">Reports</a></li>
            <li><a href="/settings">Settings</a></li>
        </ul>
    </nav>
    <script>
        document.getElementById('navToggle').addEventListener('click', function() {
            document.getElementById('navLinks').classList.toggle('open');
        });
    </script>

    <script>
    /* Shared date filter logic — applies to any page with #startDate / #endDate */
    document.addEventListener('DOMContentLoaded', function () {
        const startEl = document.getElementById('startDate');
        const endEl   = document.getElementById('endDate');
        if (!startEl || !endEl) return;

        // Restrict picker to current year and 4 previous years — no future dates
        const today = new Date();
        const todayStr = today.toISOString().split('T')[0];
        const minDate  = new Date(today);
        minDate.setFullYear(minDate.getFullYear() - 4);
        const minStr = minDate.toISOString().split('T')[0];
        startEl.max = todayStr; startEl.min = minStr;
        endEl.max   = todayStr; endEl.min   = minStr;

        // Form-based pages: validate on submit
        const form = startEl.closest('form');
        if (form) {
            form.addEventListener('submit', function (e) {
                if (!window.validateDateRange()) e.preventDefault();
            });
        }
    });

    // Shared validation helper — called by JS-driven pages in their loadAll()
    window.validateDateRange = function () {
        const startEl = document.getElementById('startDate');
        const endEl   = document.getElementById('endDate');
        const errEl   = document.getElementById('dateError');
        if (startEl && endEl && errEl && startEl.value && endEl.value && startEl.value > endEl.value) {
            errEl.style.display = 'block';
            return false;
        }
        if (errEl) errEl.style.display = 'none';
        return true;
    };
    </script>

    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
