{% extends "base.html" %}

{% block title %}Price Tracker — Cost of Living Tracker{% endblock %}

{% block content %}
<div class="pt-page">
    <h1>Price Tracker</h1>
    <p class="pt-desc">Track how the price of a specific item has changed over time.</p>
    <div class="search-row pt-search">
        <div style="position:relative; flex:1">
            <input type="text" id="itemSearch" placeholder="Type an item name…"
                   autocomplete="off" oninput="suggestItems(this.value)">
            <ul id="suggestions" class="suggestions-list" style="display:none"></ul>
        </div>
        <button class="btn" onclick="trackItem()">Track Item</button>
    </div>
    <div class="pt-chart-wrap" id="priceChartWrap" style="display:none">
        <canvas id="priceChart"></canvas>
    </div>
    <div id="priceEmpty" class="chart-empty" style="display:none">No price data found for that item.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script>
let priceChart  = null;
let suggestTimer = null;

function qs(params) {
    return Object.entries(params)
        .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
        .join('&');
}

function fmt(n) {
    return '€' + Number(n).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

async function trackItem() {
    const description = document.getElementById('itemSearch').value.trim();
    if (!description) return;

    const today = new Date();
    const defStart = new Date(today);
    defStart.setFullYear(defStart.getFullYear() - 1);
    const start = defStart.toISOString().split('T')[0];
    const end   = today.toISOString().split('T')[0];

    const res  = await fetch(`/api/price-trend?${qs({ description, start, end })}`);
    const data = await res.json();

    const wrap  = document.getElementById('priceChartWrap');
    const empty = document.getElementById('priceEmpty');
    if (priceChart) { priceChart.destroy(); priceChart = null; }

    if (!data.labels.length) {
        wrap.style.display  = 'none';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';
    wrap.style.display  = 'block';

    priceChart = new Chart(document.getElementById('priceChart').getContext('2d'), {
        type: 'line',
        data: {
            labels: data.labels,
            datasets: [{
                label: data.description,
                data: data.values,
                borderColor: '#e74c3c',
                backgroundColor: '#e74c3c22',
                pointRadius: 5,
                pointHoverRadius: 7,
                tension: 0.2,
                fill: true,
            }],
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: true },
                tooltip: {
                    callbacks: {
                        label: ctx => {
                            const price = ctx.parsed.y;
                            const idx   = ctx.dataIndex;
                            const vals  = ctx.dataset.data;
                            let line = ` ${fmt(price)} per unit`;
                            if (idx > 0 && vals[idx - 1] != null) {
                                const prev = vals[idx - 1];
                                const pct  = ((price - prev) / prev * 100).toFixed(1);
                                const sign = pct >= 0 ? '+' : '';
                                line += `  (${sign}${pct}% vs prev)`;
                            }
                            return line;
                        }
                    }
                },
            },
            scales: { y: { beginAtZero: false, ticks: { callback: v => '€' + v } } },
        },
    });
}

async function suggestItems(q) {
    clearTimeout(suggestTimer);
    const list = document.getElementById('suggestions');
    if (q.length < 2) { list.style.display = 'none'; return; }
    suggestTimer = setTimeout(async () => {
        const res   = await fetch(`/api/item-suggestions?${qs({ q })}`);
        const items = await res.json();
        list.innerHTML = '';
        if (!items.length) { list.style.display = 'none'; return; }
        items.forEach(item => {
            const li = document.createElement('li');
            li.textContent = item;
            li.addEventListener('mousedown', () => {
                document.getElementById('itemSearch').value = item;
                list.style.display = 'none';
                trackItem();
            });
            list.appendChild(li);
        });
        list.style.display = 'block';
    }, 250);
}

document.addEventListener('click', e => {
    if (!e.target.closest('#itemSearch'))
        document.getElementById('suggestions').style.display = 'none';
});

document.getElementById('itemSearch').addEventListener('keydown', e => {
    if (e.key === 'Enter') trackItem();
});
</script>
{% endblock %}
