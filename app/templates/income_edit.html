{% extends "base.html" %}
{% block title %}Edit Income — Cost of Living Tracker{% endblock %}

{% block content %}
<p style="margin-bottom:1.5rem;"><a href="{{ url_for("main.income") }}" style="color:#888; text-decoration:none;">&larr; Income</a></p>
<div class="card" style="max-width:600px;">
    <h1 style="margin-bottom:1.5rem;">Edit Income Entry</h1>
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" required value="{{ entry.date.isoformat() }}">
            </div>
            <div class="form-group">
                <label>Source</label>
                <input type="text" name="source" required value="{{ entry.source }}">
            </div>
            <div class="form-group">
                <label>Amount (€)</label>
                <input type="number" name="amount" step="0.01" min="0" required value="{{ entry.amount }}">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select name="category">
                    <option value="">— Select —</option>
                    {% for cat in income_cats %}
                    <option value="{{ cat }}" {% if cat == entry.category %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Notes</label>
                <input type="text" name="notes" value="{{ entry.notes or "" }}">
            </div>
        </div>
        <div style="margin-top:1.5rem; display:flex; gap:0.75rem;">
            <button type="submit" class="btn">Save Changes</button>
            <a href="{{ url_for("main.income") }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
