{% extends "base.html" %}
{% block title %}Edit Transaction — Cost of Living Tracker{% endblock %}
{% block content %}
<p style="margin-bottom:1.5rem;"><a href="{{ url_for('main.transactions') }}" style="color:#888; text-decoration:none;">&larr; Transactions</a></p>
<div class="card" style="max-width:600px;">
    <h1 style="margin-bottom:1.5rem;">Edit Transaction</h1>
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" required value="{{ txn.date.isoformat() }}">
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" name="description" required value="{{ txn.description }}">
            </div>
            <div class="form-group">
                <label>Amount (€)</label>
                <input type="number" name="amount" step="0.01" min="0" required value="{{ txn.amount }}">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select name="category">
                    <option value="">— none —</option>
                    {% for cat in categories %}
                    <option value="{{ cat }}" {% if cat == txn.category %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Account (Paid from)</label>
                <select name="account_id">
                    <option value="">— Unknown —</option>
                    {% for a in accounts %}
                    <option value="{{ a.id }}" {% if a.id == txn.account_id %}selected{% endif %}>{{ a.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Notes</label>
                <input type="text" name="notes" value="{{ txn.notes or '' }}">
            </div>
        </div>
        <div style="margin-top:1.5rem; display:flex; gap:0.75rem;">
            <button type="submit" class="btn">Save Changes</button>
            <a href="{{ url_for('main.transactions') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
