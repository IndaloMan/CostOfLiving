<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Unavailable — Cost of Living Tracker</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .box { background: #fff; border-radius: 12px; padding: 2.5rem 2rem; max-width: 380px; text-align: center; box-shadow: 0 2px 16px rgba(0,0,0,0.1); }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h1 { font-size: 1.3rem; color: #333; margin: 0 0 0.75rem; }
        p { color: #666; font-size: 0.95rem; line-height: 1.5; margin: 0 0 1.5rem; }
        button { background: #2980b9; color: #fff; border: none; border-radius: 6px; padding: 0.75rem 2rem; font-size: 1rem; cursor: pointer; }
        button:hover { background: #1f6a9a; }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">⚠️</div>
        <h1>Server Temporarily Unavailable</h1>
        <p>The server is not responding right now. Please wait a moment and try again.</p>
        <p>If still not working after 10 mins, msg Nigel.</p>
        <button onclick="location.reload()">Try Again</button>
    </div>
</body>
</html>
